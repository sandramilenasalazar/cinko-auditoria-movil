name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    name: Build APK y crear Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Expo CLI
        run: npm install -g @expo/cli

      - name: Generar proyecto Android nativo
        run: npx expo prebuild --platform android --clean

      - name: Dar permisos a Gradle
        run: chmod +x android/gradlew

      - name: Build APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Renombrar APK
        run: cp android/app/build/outputs/apk/release/app-release-unsigned.apk cinko-auditoria-movil.apk

      - name: Crear GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Cinko Auditoria Movil ${{ github.ref_name }}"
          body: |
            ## Cinko Auditoria Movil ${{ github.ref_name }}

            ### Instalación en Android
            1. Descarga el archivo **cinko-auditoria-movil.apk**
            2. En tu dispositivo Android, ve a **Ajustes → Seguridad** y habilita **Instalar apps de fuentes desconocidas**
            3. Abre el archivo `.apk` descargado e instala la aplicación
          files: cinko-auditoria-movil.apk
          draft: false
          prerelease: false
